<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Signal Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 AI SIGNAL TERMINAL</h1>
        <div class="signal-display">
            <div id="current-signal">Очікування сигналу...</div>
        </div>
        <div class="settings">
            <div class="setting-group">
                <label for="asset-select">Актив:</label>
                <select id="asset-select">
                    <option value="EURUSD">EUR/USD</option>
                    <option value="GBPUSD">GBP/USD</option>
                    <option value="USDJPY">USD/JPY</option>
                    <option value="USDCHF">USD/CHF</option>
                    <option value="AUDUSD">AUD/USD</option>
                    <option value="USDCAD">USD/CAD</option>
                    <option value="NZDUSD">NZD/USD</option>
                    <option value="EURJPY">EUR/JPY</option>
                    <option value="GBPJPY">GBP/JPY</option>
                    <option value="EURGBP">EUR/GBP</option>
                    <option value="AUDJPY">AUD/JPY</option>
                    <option value="CADJPY">CAD/JPY</option>
                    <option value="CHFJPY">CHF/JPY</option>
                    <option value="NZDJPY">NZD/JPY</option>
                </select>
            </div>
            <div class="setting-group">
                <label for="amount-select">Сума:</label>
                <select id="amount-select">
                    <option value="1">1 USD</option>
                    <option value="2">2 USD</option>
                    <option value="5">5 USD</option>
                    <option value="10">10 USD</option>
                    <option value="25">25 USD</option>
                    <option value="50">50 USD</option>
                    <option value="100">100 USD</option>
                </select>
            </div>
            <div class="setting-group">
                <label for="timeframe-select">Експірація:</label>
                <select id="timeframe-select">
                    <option value="60">1 хвилина</option>
                    <option value="120">2 хвилини</option>
                    <option value="180">3 хвилини</option>
                    <option value="300">5 хвилин</option>
                    <option value="600">10 хвилин</option>
                    <option value="900">15 хвилин</option>
                    <option value="1800">30 хвилин</option>
                    <option value="3600">1 година</option>
                    <option value="7200">2 години</option>
                    <option value="14400">4 години</option>
                    <option value="28800">8 годин</option>
                    <option value="86400">1 день</option>
                </select>
            </div>
        </div>
        <div class="controls">
            <button id="up-btn" class="trade-btn up">📈 UP</button>
            <button id="down-btn" class="trade-btn down">📉 DOWN</button>
        </div>
        <div class="status">
            <div id="trade-status"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
