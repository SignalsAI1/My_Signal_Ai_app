<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - My AI Signal</title>
    <meta name="description" content="Admin panel for managing user verifications and access control">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    
    <!-- Styles -->
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Loading state */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
        }
        
        /* Error state */
        .error-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }
        
        .error-title {
            font-size: 24px;
            color: #ff4444;
            margin-bottom: 10px;
        }
        
        .error-message {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            max-width: 500px;
        }
        
        .retry-button {
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            border: none;
            border-radius: 8px;
            color: #000000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Loading state -->
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <div class="loading-text">Завантаження адмін панелі...</div>
        </div>
    </div>

    <script>
        // Admin Panel Application
        class AdminApp {
            constructor() {
                this.adminToken = '123456'; // Default admin token
                this.apiBase = window.location.origin;
                this.isLoading = true;
                this.error = null;
                this.users = [];
                this.statistics = null;
                this.searchTerm = '';
                this.filter = 'all';
                this.selectedUsers = new Set();
                
                this.init();
            }
            
            async init() {
                try {
                    // Check if we have admin token in URL or localStorage
                    const urlParams = new URLSearchParams(window.location.search);
                    const tokenParam = urlParams.get('token');
                    const storedToken = localStorage.getItem('adminToken');
                    
                    this.adminToken = tokenParam || storedToken || '123456';
                    
                    // Store token for future use
                    if (tokenParam) {
                        localStorage.setItem('adminToken', tokenParam);
                    }
                    
                    // Load initial data
                    await this.loadData();
                    
                    // Set up auto-refresh
                    setInterval(() => this.loadData(), 5000);
                    
                    // Render UI
                    this.render();
                } catch (error) {
                    this.handleError(error);
                }
            }
            
            async loadData() {
                try {
                    const [usersResponse, statsResponse] = await Promise.all([
                        fetch(`${this.apiBase}/api/admin/users`, {
                            headers: { 'admin': this.adminToken }
                        }),
                        fetch(`${this.apiBase}/api/admin/statistics`, {
                            headers: { 'admin': this.adminToken }
                        })
                    ]);
                    
                    if (usersResponse.ok && statsResponse.ok) {
                        this.users = await usersResponse.json();
                        this.statistics = await statsResponse.json();
                        this.error = null;
                    } else {
                        throw new Error('Failed to fetch admin data');
                    }
                } catch (error) {
                    this.error = error.message;
                }
                
                this.isLoading = false;
                this.render();
            }
            
            async approveUser(userId) {
                try {
                    const response = await fetch(`${this.apiBase}/api/admin/approve`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'admin': this.adminToken
                        },
                        body: JSON.stringify({ userId })
                    });
                    
                    if (response.ok) {
                        await this.loadData();
                    } else {
                        throw new Error('Failed to approve user');
                    }
                } catch (error) {
                    this.error = error.message;
                    this.render();
                }
            }
            
            async rejectUser(userId) {
                try {
                    const response = await fetch(`${this.apiBase}/api/admin/reject`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'admin': this.adminToken
                        },
                        body: JSON.stringify({ userId, reason: 'Rejected by admin' })
                    });
                    
                    if (response.ok) {
                        await this.loadData();
                    } else {
                        throw new Error('Failed to reject user');
                    }
                } catch (error) {
                    this.error = error.message;
                    this.render();
                }
            }
            
            toggleUserSelection(userId) {
                if (this.selectedUsers.has(userId)) {
                    this.selectedUsers.delete(userId);
                } else {
                    this.selectedUsers.add(userId);
                }
                this.render();
            }
            
            async bulkApprove() {
                if (this.selectedUsers.size === 0) return;
                
                try {
                    const response = await fetch(`${this.apiBase}/api/admin/bulk-approve`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'admin': this.adminToken
                        },
                        body: JSON.stringify({ userIds: Array.from(this.selectedUsers) })
                    });
                    
                    if (response.ok) {
                        this.selectedUsers.clear();
                        await this.loadData();
                    } else {
                        throw new Error('Failed to bulk approve users');
                    }
                } catch (error) {
                    this.error = error.message;
                    this.render();
                }
            }
            
            async bulkReject() {
                if (this.selectedUsers.size === 0) return;
                
                try {
                    const response = await fetch(`${this.apiBase}/api/admin/bulk-reject`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'admin': this.adminToken
                        },
                        body: JSON.stringify({ 
                            userIds: Array.from(this.selectedUsers), 
                            reason: 'Bulk rejected by admin' 
                        })
                    });
                    
                    if (response.ok) {
                        this.selectedUsers.clear();
                        await this.loadData();
                    } else {
                        throw new Error('Failed to bulk reject users');
                    }
                } catch (error) {
                    this.error = error.message;
                    this.render();
                }
            }
            
            handleError(error) {
                this.error = error.message;
                this.isLoading = false;
                this.render();
            }
            
            getStatusColor(status) {
                switch (status) {
                    case 'pending': return '#ffaa00';
                    case 'approved': return '#00ff88';
                    case 'rejected': return '#ff4444';
                    default: return '#ffffff';
                }
            }
            
            getStatusIcon(status) {
                switch (status) {
                    case 'pending': return '⏳';
                    case 'approved': return '✅';
                    case 'rejected': return '❌';
                    default: return '❓';
                }
            }
            
            formatDateTime(dateString) {
                return new Date(dateString).toLocaleString('uk-UA', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
            
            getFilteredUsers() {
                return this.users.filter(user => {
                    const matchesSearch = user.brokerId.toLowerCase().includes(this.searchTerm.toLowerCase()) ||
                                     user.userId.toLowerCase().includes(this.searchTerm.toLowerCase());
                    const matchesFilter = this.filter === 'all' || user.status === this.filter;
                    return matchesSearch && matchesFilter;
                });
            }
            
            render() {
                const root = document.getElementById('root');
                
                if (this.isLoading) {
                    root.innerHTML = `
                        <div class="loading-container">
                            <div class="loading-spinner"></div>
                            <div class="loading-text">Завантаження даних...</div>
                        </div>
                    `;
                    return;
                }
                
                if (this.error) {
                    root.innerHTML = `
                        <div class="error-container">
                            <div class="error-title">❌ Помилка</div>
                            <div class="error-message">${this.error}</div>
                            <button class="retry-button" onclick="location.reload()">Спробувати знову</button>
                        </div>
                    `;
                    return;
                }
                
                const filteredUsers = this.getFilteredUsers();
                
                root.innerHTML = `
                    <div class="admin-panel">
                        <div class="admin-header">
                            <h1>🔐 Admin Panel</h1>
                            <p>Керування користувачами та верифікаціями</p>
                        </div>
                        
                        ${this.statistics ? `
                            <div class="statistics">
                                <div class="stat-card">
                                    <div class="stat-number">${this.statistics.totalUsers}</div>
                                    <div class="stat-label">Всього користувачів</div>
                                </div>
                                <div class="stat-card pending">
                                    <div class="stat-number">${this.statistics.pendingUsers}</div>
                                    <div class="stat-label">Очікують</div>
                                </div>
                                <div class="stat-card approved">
                                    <div class="stat-number">${this.statistics.approvedUsers}</div>
                                    <div class="stat-label">Підтверджено</div>
                                </div>
                                <div class="stat-card rejected">
                                    <div class="stat-number">${this.statistics.rejectedUsers}</div>
                                    <div class="stat-label">Відхилено</div>
                                </div>
                            </div>
                        ` : ''}
                        
                        <div class="controls">
                            <div class="search-filter">
                                <input
                                    type="text"
                                    placeholder="Пошук за Broker ID або User ID..."
                                    value="${this.searchTerm}"
                                    onchange="app.searchTerm = this.value; app.render()"
                                    class="search-input"
                                />
                                <select
                                    value="${this.filter}"
                                    onchange="app.filter = this.value; app.render()"
                                    class="filter-select"
                                >
                                    <option value="all">Всі</option>
                                    <option value="pending">Очікують</option>
                                    <option value="approved">Підтверджено</option>
                                    <option value="rejected">Відхилено</option>
                                </select>
                            </div>
                            
                            ${this.selectedUsers.size > 0 ? `
                                <div class="bulk-actions">
                                    <span class="selected-count">Обрано: ${this.selectedUsers.size}</span>
                                    <button class="bulk-approve-btn" onclick="app.bulkApprove()">
                                        ✅ Підтвердити всіх
                                    </button>
                                    <button class="bulk-reject-btn" onclick="app.bulkReject()">
                                        ❌ Відхилити всіх
                                    </button>
                                    <button class="clear-selection-btn" onclick="app.selectedUsers.clear(); app.render()">
                                        Очистити вибір
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="users-table">
                            <div class="table-header">
                                <div class="checkbox-cell">
                                    <input
                                        type="checkbox"
                                        ${this.selectedUsers.size === filteredUsers.length && filteredUsers.length > 0 ? 'checked' : ''}
                                        onchange="if (this.checked) { app.selectedUsers = new Set(${filteredUsers.map(u => `"${u.userId}"`)}); } else { app.selectedUsers.clear(); } app.render();"
                                    />
                                </div>
                                <div class="user-id-cell">User ID</div>
                                <div class="broker-id-cell">Broker ID</div>
                                <div class="status-cell">Статус</div>
                                <div class="date-cell">Створено</div>
                                <div class="date-cell">Оновлено</div>
                                <div class="actions-cell">Дії</div>
                            </div>
                            
                            ${filteredUsers.map(user => `
                                <div class="table-row">
                                    <div class="checkbox-cell">
                                        <input
                                            type="checkbox"
                                            ${this.selectedUsers.has(user.userId) ? 'checked' : ''}
                                            onchange="app.toggleUserSelection('${user.userId}')"
                                        />
                                    </div>
                                    <div class="user-id-cell">
                                        <span class="user-id">${user.userId.slice(0, 8)}...</span>
                                    </div>
                                    <div class="broker-id-cell">
                                        <span class="broker-id">${user.brokerId}</span>
                                    </div>
                                    <div class="status-cell">
                                        <span class="status-badge" style="color: ${this.getStatusColor(user.status)}">
                                            ${this.getStatusIcon(user.status)} ${user.status.toUpperCase()}
                                        </span>
                                    </div>
                                    <div class="date-cell">
                                        <span class="date">${this.formatDateTime(user.createdAt)}</span>
                                    </div>
                                    <div class="date-cell">
                                        <span class="date">${this.formatDateTime(user.updatedAt)}</span>
                                    </div>
                                    <div class="actions-cell">
                                        ${user.status === 'pending' ? `
                                            <button class="approve-btn" onclick="app.approveUser('${user.userId}')">✅</button>
                                            <button class="reject-btn" onclick="app.rejectUser('${user.userId}')">❌</button>
                                        ` : '<span class="no-actions">—</span>'}
                                    </div>
                                </div>
                            `).join('')}
                            
                            ${filteredUsers.length === 0 ? `
                                <div class="no-results">
                                    <p>Користувачів не знайдено</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }
        }
        
        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            window.app = new AdminApp();
        });
    </script>
    
    <!-- Include styles from AdminPanel.css -->
